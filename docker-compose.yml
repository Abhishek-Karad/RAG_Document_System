version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faiss-backend
    ports:
      - "7999:7999"
    environment:
      - PORT=7999
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
      - ./faiss_index.bin:/app/faiss_index.bin
      - ./faiss_metadata.pkl:/app/faiss_metadata.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7999/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: faiss-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:7999
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  uploads:
  index-data:

networks:
  default:
    name: faiss-network
